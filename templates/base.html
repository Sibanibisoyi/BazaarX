{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BazaarX - Your world-class online shopping destination for electronics, fashion, home essentials, and more.">
    <title>{% block title %}BazaarX — Shop Smart{% endblock %}</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/main.css' %}?v=1.2">
</head>
<body>

    {% include 'navbar.html' %}

    {% if messages %}
    <div class="container mt-3" style="position: relative; z-index: 1050;">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="min-vh-100 pb-5">
        {% block content %}
        {% endblock %}
    </main>

    {% include 'footer.html' %}

    <!-- Amazon-style Add to Cart Toast -->
    <div id="cartToast" style="
        display: none;
        position: fixed;
        top: 80px;
        right: 20px;
        z-index: 9999;
        min-width: 300px;
        max-width: 360px;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        padding: 0;
        overflow: hidden;
        animation: slideInToast 0.35s cubic-bezier(.4,0,.2,1);
        border: 1px solid #e0e0e0;
    ">
        <div id="cartToastHeader" style="background: #232f3e; color:#fff; padding: 10px 16px; display:flex; align-items:center; gap:8px; font-size:13px; font-weight:600; letter-spacing:0.3px;">
            <i id="cartToastIcon" class="fas fa-check-circle" style="color:#00c851; font-size:15px;"></i>
            <span id="cartToastTitle">Added to Cart</span>
            <button onclick="document.getElementById('cartToast').style.display='none'" style="margin-left:auto; background:none; border:none; color:#fff; font-size:18px; cursor:pointer; line-height:1; padding:0 2px;">&times;</button>
        </div>
        <div style="padding: 14px 16px 12px 16px;">
            <p id="cartToastMsg" style="margin:0 0 12px 0; color:#222; font-size:14px; line-height:1.5;"></p>
            <a href="{% url 'cart:cart_detail' %}" style="display:inline-block; background:#f0c14b; color:#111; font-weight:600; font-size:13px; border-radius:6px; padding:7px 18px; text-decoration:none; border:1px solid #a88734; transition:background 0.2s;">
                <i class="fas fa-shopping-cart me-1"></i> Go to Cart
            </a>
        </div>
    </div>

    <!-- Back to Top Button -->
    <a href="#" id="backToTopBtn" style="display: none; position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px; background: var(--primary); color: white; border-radius: 50%; align-items: center; justify-content: center; text-decoration: none; box-shadow: var(--shadow-lg); z-index: 1000; transition: var(--transition); opacity: 0;">
        <i class="fas fa-arrow-up"></i>
    </a>

    <style>
    @keyframes slideInToast {
        from { opacity: 0; transform: translateX(60px); }
        to   { opacity: 1; transform: translateX(0); }
    }
    #cartToast a:hover { background: #e3b213; }
    </style>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{% static 'js/main.js' %}?v=2.1"></script>
    <script>
const btn = document.getElementById('voiceSearchBtn');
if (btn && 'webkitSpeechRecognition' in window) {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = 'en-IN';
    recognition.continuous = false;
    recognition.interimResults = false;

    btn.addEventListener('click', () => {
        recognition.start();
        btn.classList.add('listening');
        console.log('Listening started...');
    });

    recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    console.log('Heard:', transcript);
    
    const searchForm = document.querySelector('.search-form');
    const searchInput = searchForm ? searchForm.querySelector('input[name="q"]') : null;
    
    console.log('Search input found:', searchInput);
    
    if (searchInput) {
        searchInput.value = transcript;
        searchForm.submit();
    }
};

    recognition.onend = () => {
        btn.classList.remove('listening');
        console.log('Listening ended');
    };

    recognition.onerror = (e) => {
        btn.classList.remove('listening');
        console.log('Error:', e.error);
    };
} else {
    console.log('Voice not supported or button not found');
}
</script>
</body>
</html>
