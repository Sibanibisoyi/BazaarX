{% extends 'base.html' %}

{% block content %}
<h2 class="mb-4">My Orders</h2>

<table class="table">
    <thead>
        <tr>
            <th>Order ID</th>
            <th>Product</th>
            <th>Quantity</th>
            <th>Price</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        {% for item in order_items %}
        <tr>
            <td>#{{ item.order.id }}</td>
            <td>{{ item.product.name }}</td>
            <td>{{ item.quantity }}</td>
            <td>₹{{ item.price }}</td>
            <td>{{ item.order.status }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="5">No orders yet</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
