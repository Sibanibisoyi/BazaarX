{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body p-4 text-center">
                    <h4 class="fw-bold mb-2">Verify Your Email</h4>
                    <p class="text-muted small mb-4">Enter the 6-digit OTP sent to your email</p>
                    {% if messages %}
                        {% for message in messages %}
                        <div class="alert alert-danger">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                    <form method="POST">
                        {% csrf_token %}
                        <input type="text" name="otp" class="form-control text-center fw-bold fs-4 mb-3" maxlength="6" placeholder="000000" autofocus>
                        <button type="submit" class="btn btn-primary w-100">Verify OTP</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
